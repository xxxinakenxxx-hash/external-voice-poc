<!DOCTYPE html>
<html lang="ja">
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title><?= model.pageTitle ?></title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe6;
        --panel: #ffffff;
        --panel-soft: #faf7f1;
        --text: #1f2937;
        --muted: #5b6776;
        --accent: #173d5f;
        --accent-strong: #f0892b;
        --border: #d9e0e8;
        --shadow: 0 18px 48px rgba(23, 61, 95, 0.12);
        --danger: #b42318;
        --danger-soft: #fdecec;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(240, 137, 43, 0.14), transparent 34%),
          radial-gradient(circle at bottom right, rgba(23, 61, 95, 0.10), transparent 30%),
          linear-gradient(180deg, #fdf8ef 0%, var(--bg) 100%);
        color: var(--text);
      }

      main {
        width: 100%;
        max-width: 920px;
        margin: 0 auto;
        padding: calc(14px + env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) calc(20px + env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .hero {
        position: relative;
        overflow: hidden;
        border-radius: 22px;
        padding: 22px 20px;
        background: linear-gradient(135deg, rgba(23, 61, 95, 0.98), rgba(30, 83, 128, 0.96));
        color: #fff;
        box-shadow: var(--shadow);
      }

      .hero::after {
        content: "";
        position: absolute;
        right: -52px;
        top: -54px;
        width: 170px;
        height: 170px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
      }

      .eyebrow {
        margin: 0 0 6px;
        font-size: 0.82rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.78);
      }

      h1 {
        margin: 0;
        font-size: 1.92rem;
        line-height: 1.2;
      }

      .subtext {
        margin: 10px 0 0;
        font-size: 1.03rem;
        line-height: 1.7;
        color: rgba(255, 255, 255, 0.9);
      }

      .label {
        margin: 0 0 8px;
        font-size: 0.92rem;
        font-weight: 700;
        color: var(--muted);
      }

      .user-name {
        margin: 0;
        color: var(--accent);
        font-size: 1.38rem;
        font-weight: 900;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 22px;
        box-shadow: var(--shadow);
        padding: 18px 18px 17px;
      }

      .notice {
        border-radius: 16px;
        padding: 14px 16px;
        border: 1px solid var(--border);
        background: var(--panel-soft);
        color: var(--muted);
        line-height: 1.7;
      }

      .notice--error {
        border-color: #f5c2c7;
        background: var(--danger-soft);
        color: var(--danger);
        font-weight: 700;
      }

      .link-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 56px;
        border-radius: 18px;
        border: none;
        padding: 12px 18px;
        text-decoration: none;
        background: linear-gradient(180deg, var(--accent-strong) 0%, #dd6e11 100%);
        color: #fff;
        font-size: 1.06rem;
        font-weight: 800;
        box-shadow: 0 16px 30px rgba(232, 122, 31, 0.24);
      }

      .mobile-shell {
        display: none;
      }

      @media (min-width: 768px) {
        main {
          padding: 24px 18px 32px;
        }

        .hero {
          padding: 28px 26px;
        }

        .card {
          padding: 20px 22px;
        }

        h1 {
          font-size: 2.12rem;
        }

        .subtext {
          font-size: 1.06rem;
        }

        .user-name {
          font-size: 1.5rem;
        }
      }

      @media (max-width: 767px) {
        body {
          min-height: 100dvh;
          background: linear-gradient(180deg, #edf2f7 0%, #e3ebf3 100%);
        }

        main {
          width: min(100%, 430px);
          max-width: 430px;
          margin: 0 auto;
          padding: calc(16px + env(safe-area-inset-top)) 15px calc(16px + env(safe-area-inset-bottom));
        }

        .stack {
          display: none;
        }

        .mobile-shell {
          display: grid;
          gap: 16px;
        }

        .mobile-hero {
          position: relative;
          overflow: hidden;
          padding: 30px 24px 28px;
          border-radius: 26px;
          background: linear-gradient(145deg, #24476d 0%, #1a3a5c 100%);
          color: #fff;
          box-shadow: 0 18px 36px rgba(22, 48, 71, 0.14);
        }

        .mobile-hero::after {
          content: "";
          position: absolute;
          top: -36px;
          right: -32px;
          width: 112px;
          height: 112px;
          border-radius: 50%;
          background: rgba(255, 255, 255, 0.08);
        }

        .mobile-profile,
        .mobile-action {
          background: #ffffff;
          border: 1px solid #d7e0ea;
          border-radius: 22px;
          box-shadow: 0 14px 30px rgba(22, 48, 71, 0.08);
        }

        .mobile-profile {
          display: grid;
          gap: 8px;
          padding: 22px 24px;
        }

        .mobile-app-name {
          margin: 0 0 8px;
          color: rgba(255, 255, 255, 0.8);
          font-size: 16px;
          font-weight: 800;
          letter-spacing: 0.08em;
        }

        .mobile-headline {
          margin: 0;
          color: #ffffff;
          font-size: 33px;
          line-height: 1.16;
          letter-spacing: -0.03em;
          font-weight: 900;
        }

        .mobile-description {
          margin: 12px 0 0;
          color: rgba(255, 255, 255, 0.9);
          font-size: 16px;
          line-height: 1.65;
        }

        .mobile-notice {
          margin: 0;
          padding: 12px 14px;
          border-radius: 14px;
          border: 1px solid rgba(180, 35, 24, 0.16);
          background: rgba(253, 236, 236, 0.9);
          color: var(--danger);
          font-size: 14px;
          line-height: 1.6;
          font-weight: 700;
        }

        .mobile-label {
          margin: 0;
          color: var(--muted);
          font-size: 15px;
          font-weight: 800;
          letter-spacing: 0.03em;
        }

        .mobile-user-name {
          margin: 0;
          color: #10263f;
          font-size: 23px;
          line-height: 1.28;
          font-weight: 900;
          word-break: break-word;
        }

        .mobile-action {
          display: grid;
          gap: 12px;
          padding: 22px 24px 20px;
        }

        .mobile-action .link-button {
          min-height: 62px;
          border-radius: 16px;
          font-size: 18px;
          box-shadow: 0 16px 26px rgba(232, 122, 31, 0.24);
        }

        .mobile-action-note {
          margin: 0;
          color: var(--muted);
          font-size: 13px;
          line-height: 1.6;
          text-align: center;
        }

        .mobile-footnote {
          margin: 0;
          padding: 10px 2px 0;
          color: #5f6975;
          font-size: 13px;
          line-height: 1.6;
          text-align: center;
        }

        .mobile-shell .notice {
          padding: 12px 14px;
          border-radius: 14px;
          font-size: 14px;
        }

        .mobile-shell .mobile-action .link-button {
          width: 100%;
        }

        .mobile-shell .mobile-profile,
        .mobile-shell .mobile-action,
        .mobile-shell .mobile-footnote {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mobile-shell">
        <section class="mobile-hero" aria-label="営業AIメモの入口画面">
          <p class="mobile-app-name">営業AIメモ</p>
          <h1 class="mobile-headline">商談を、すぐ記録。</h1>
          <p class="mobile-description">商談内容を話すか入力すると、AIが整理して保存します。</p>
        </section>

        <? if (model.noticeMessage) { ?>
          <section class="mobile-notice" aria-live="assertive"><?= model.noticeMessage ?></section>
        <? } ?>

        <section class="mobile-profile" aria-live="polite">
          <p class="mobile-label">ログイン中</p>
          <p class="mobile-user-name"><?= model.userName ?></p>
        </section>

        <? if (model.inputPageLinkUrl) { ?>
          <section class="mobile-action">
            <a class="link-button" href="<?= model.inputPageLinkUrl ?>" target="_top" rel="noopener">商談メモを入力する</a>
          </section>
          <p class="mobile-footnote">会社のGoogleアカウントで本人確認済みです</p>
        <? } ?>
      </div>

      <div class="stack">
        <section class="hero" aria-label="営業AIメモの入口画面">
          <p class="eyebrow">営業AIメモ</p>
          <h1>営業AIメモ</h1>
          <p class="subtext">ログイン中の担当者を確認して、商談メモ入力へ進みます。</p>
        </section>

        <section class="card" aria-live="polite">
          <p class="label">担当者名</p>
          <p class="user-name"><?= model.userName ?></p>
        </section>

        <? if (model.noticeMessage) { ?>
          <section class="notice notice--error" aria-live="assertive"><?= model.noticeMessage ?></section>
        <? } ?>

        <? if (model.inputPageLinkUrl) { ?>
          <section class="card">
            <p class="label">入力画面へ進む</p>
            <a class="link-button" href="<?= model.inputPageLinkUrl ?>" target="_top" rel="noopener">商談メモを入力する</a>
          </section>
        <? } ?>
      </div>
    </main>
  </body>
</html>
