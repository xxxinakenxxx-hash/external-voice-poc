<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>外部入力専用マイクページ</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f5f5;
        --surface: #ffffff;
        --surface-soft: #f7f9fc;
        --text: #163047;
        --muted: #5f6f81;
        --line: #d7e0ea;
        --primary: #1a3a5c;
        --primary-soft: #dbe7f3;
        --accent: #e8913a;
        --accent-soft: #fff1dd;
        --danger: #b42318;
        --danger-soft: #fdecec;
        --success: #157347;
        --shadow: 0 18px 40px rgba(22, 48, 71, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        min-height: 100vh;
        font-family: sans-serif;
        font-size: 16px;
        line-height: 1.6;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(232, 145, 58, 0.15), transparent 24%),
          radial-gradient(circle at bottom right, rgba(26, 58, 92, 0.12), transparent 26%),
          linear-gradient(180deg, #fafbfc 0%, var(--bg) 100%);
      }

      main {
        width: min(100%, 780px);
        margin: 0 auto;
        padding: 16px 12px 28px;
      }

      .page {
        display: grid;
        gap: 12px;
      }

      .hero,
      .panel {
        border: 1px solid var(--line);
        border-radius: 22px;
        box-shadow: var(--shadow);
      }

      .hero {
        position: relative;
        overflow: hidden;
        padding: 20px 18px 18px;
        color: #fff;
        background: linear-gradient(145deg, #24476d 0%, #1a3a5c 100%);
      }

      .hero::after {
        content: "";
        position: absolute;
        top: -42px;
        right: -34px;
        width: 150px;
        height: 150px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
      }

      .eyebrow {
        margin: 0 0 8px;
        font-size: 0.82rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.74);
      }

      h1 {
        margin: 0;
        font-size: 1.8rem;
        line-height: 1.18;
      }

      .hero p {
        margin: 10px 0 0;
        color: rgba(255, 255, 255, 0.9);
      }

      .panel {
        background: var(--surface);
        padding: 16px;
      }

      .section-title {
        margin: 0 0 8px;
        font-size: 0.94rem;
        font-weight: 800;
        letter-spacing: 0.02em;
        color: var(--muted);
      }

      .notice,
      .status,
      .result {
        border-radius: 16px;
        border: 1px solid var(--line);
      }

      .notice {
        margin: 0;
        padding: 12px 14px;
        background: var(--accent-soft);
        color: #8a4d0b;
        font-weight: 700;
      }

      .status {
        min-height: 1.5em;
        margin: 0;
        padding: 10px 12px;
        background: var(--surface-soft);
        color: var(--muted);
        font-weight: 800;
      }

      .status.is-listening {
        background: #fff5eb;
        color: #a55409;
      }

      .status.is-error {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .status.is-success {
        background: #eaf6ef;
        color: var(--success);
      }

      .mic-button,
      .send-button,
      .secondary-button {
        appearance: none;
        border: none;
        min-height: 52px;
        width: 100%;
        border-radius: 18px;
        padding: 14px 16px;
        font-size: 1rem;
        font-weight: 800;
        cursor: pointer;
        transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
      }

      .mic-button {
        color: #fff;
        background: linear-gradient(180deg, #f0a54a 0%, var(--accent) 100%);
        box-shadow: 0 16px 26px rgba(232, 145, 58, 0.26);
      }

      .mic-button.is-listening {
        background: linear-gradient(180deg, #e05244 0%, #b42318 100%);
        box-shadow: 0 16px 26px rgba(180, 35, 24, 0.26);
      }

      .send-button {
        color: #fff;
        background: linear-gradient(180deg, #24527f 0%, var(--primary) 100%);
        box-shadow: 0 16px 26px rgba(26, 58, 92, 0.22);
      }

      .secondary-button {
        color: var(--primary);
        background: #eef3f8;
        border: 1px solid var(--line);
      }

      .mic-button:active,
      .send-button:active,
      .secondary-button:active {
        transform: translateY(1px);
      }

      .mic-button:disabled,
      .send-button:disabled,
      .secondary-button:disabled {
        cursor: not-allowed;
        opacity: 0.56;
        box-shadow: none;
      }

      .button-row {
        display: grid;
        gap: 10px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field-label {
        margin: 0;
        font-size: 0.94rem;
        font-weight: 800;
        color: var(--muted);
      }

      .textarea {
        width: 100%;
        min-height: 240px;
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 14px 16px;
        resize: vertical;
        font-size: 16px;
        line-height: 1.7;
        color: var(--text);
        background: #fff;
        outline: none;
      }

      .textarea:focus {
        border-color: #98b3cb;
        box-shadow: 0 0 0 4px rgba(26, 58, 92, 0.12);
      }

      .textarea::placeholder {
        color: #8795a6;
      }

      .actions {
        display: grid;
        gap: 10px;
      }

      .result {
        min-height: 120px;
        margin: 0;
        padding: 12px 14px;
        background: var(--surface-soft);
        white-space: pre-wrap;
        word-break: break-word;
        overflow-wrap: anywhere;
      }

      .result.is-empty {
        color: #7f8d9b;
      }

      .helper-text {
        margin: 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .hidden {
        display: none !important;
      }

      @media (min-width: 640px) {
        main {
          padding: 24px 16px 36px;
        }

        .hero {
          padding: 26px 24px 24px;
        }

        h1 {
          font-size: 2rem;
        }

        .button-row {
          grid-template-columns: minmax(0, 1fr) minmax(160px, 220px);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="page">
        <section class="hero" aria-label="外部入力専用マイクページの見出し">
          <p class="eyebrow">External Input Page</p>
          <h1>外部入力専用マイクページ</h1>
          <p>TOP画面から受け取った token を使って、入力内容を本番 GAS に送信します。</p>
        </section>

        <section class="panel" aria-labelledby="purpose-title">
          <p class="section-title" id="purpose-title">このページの役割</p>
          <p class="notice">ここでは音声認識、手入力、未送信テキストの保全、GAS 送信だけを扱います。</p>
        </section>

        <section class="panel" aria-labelledby="voice-title">
          <p class="section-title" id="voice-title">音声入力</p>
          <p id="voiceStatus" class="status">待機中</p>
          <div class="button-row" style="margin-top: 10px;">
            <button id="micButton" class="mic-button" type="button" aria-pressed="false">マイク開始</button>
          </div>

          <div class="field" style="margin-top: 14px;">
            <label class="field-label" for="memoInput">入力欄</label>
            <textarea
              id="memoInput"
              class="textarea"
              placeholder="認識した内容が末尾へ追記されます。手入力や編集もできます。"
            ></textarea>
            <p class="helper-text">認識結果は上書きせず、末尾へ追記します。</p>
          </div>
        </section>

        <section class="panel" aria-labelledby="send-title">
          <p class="section-title" id="send-title">送信</p>
          <div class="actions">
            <button id="sendButton" class="send-button" type="button">送信</button>
            <p id="sendStatus" class="status">TOP画面からアクセスしてください</p>
            <p id="unsentNotice" class="notice hidden">前回の入力が未送信です。送信してください</p>
          </div>

          <div class="field" style="margin-top: 14px;">
            <p class="field-label">結果表示</p>
            <pre id="resultArea" class="result is-empty" aria-live="polite">（保存結果がここに表示されます）</pre>
            <p class="helper-text">送信時は token と inputText のみを GAS に POST します。</p>
          </div>
        </section>
      </div>
    </main>

    <script>
      const GAS_SUBMIT_URL = 'https://script.google.com/macros/s/AKfycbyji7sp3rftUVwQIRunFp1ClXc_9m_UDzXASkFHDq6P4_-j3srqWrr7I0XSfrj0FTk/exec';
      const TOKEN_STORAGE_KEY = 'input_page_token';
      const STORAGE_KEY = 'unsent_text';
      const TOP_ACCESS_MESSAGE = 'TOP画面からアクセスしてください';
      const SENDING_MESSAGE = '記録しています…';

      const elements = {
        micButton: document.getElementById('micButton'),
        memoInput: document.getElementById('memoInput'),
        voiceStatus: document.getElementById('voiceStatus'),
        sendButton: document.getElementById('sendButton'),
        sendStatus: document.getElementById('sendStatus'),
        unsentNotice: document.getElementById('unsentNotice'),
        resultArea: document.getElementById('resultArea'),
      };

      const state = {
        recognition: null,
        supported: false,
        listening: false,
        starting: false,
        sending: false,
        token: '',
      };

      function safeString(value) {
        return value === undefined || value === null ? '' : String(value);
      }

      function setStatus(element, text, kind) {
        element.textContent = text;
        element.className = 'status';
        if (kind) {
          element.classList.add(`is-${kind}`);
        }
      }

      function setResult(text, empty) {
        elements.resultArea.textContent = text;
        elements.resultArea.classList.toggle('is-empty', Boolean(empty));
      }

      function showUnsentNotice(show) {
        elements.unsentNotice.classList.toggle('hidden', !show);
      }

      function readSavedText() {
        return localStorage.getItem(STORAGE_KEY);
      }

      function saveUnsentText(text) {
        const normalizedText = safeString(text);
        if (normalizedText.trim()) {
          localStorage.setItem(STORAGE_KEY, normalizedText);
          showUnsentNotice(true);
          return;
        }

        localStorage.removeItem(STORAGE_KEY);
        showUnsentNotice(false);
      }

      function clearUnsentTextAfterWriteSuccess() {
        localStorage.removeItem(STORAGE_KEY);
        showUnsentNotice(false);
      }

      function restoreUnsentText() {
        const saved = readSavedText();
        if (saved === null) {
          showUnsentNotice(false);
          return false;
        }

        elements.memoInput.value = saved;
        showUnsentNotice(true);
        return true;
      }

      function getRecognitionConstructor() {
        return window.SpeechRecognition || window.webkitSpeechRecognition || null;
      }

      function appendTranscript(transcript) {
        const text = safeString(transcript).trim();
        if (!text) {
          return;
        }

        const current = elements.memoInput.value.trim();
        elements.memoInput.value = current ? `${current}\n${text}` : text;
        saveUnsentText(elements.memoInput.value);
      }

      function stopRecognition() {
        if (!state.recognition) {
          return;
        }

        try {
          state.recognition.stop();
        } catch (error) {
          state.listening = false;
          state.starting = false;
          setStatus(elements.voiceStatus, '待機中', '');
          updateMicButton();
        }
      }

      function startRecognition() {
        if (!state.supported || !state.recognition || state.listening || state.starting) {
          return;
        }

        state.starting = true;
        setStatus(elements.voiceStatus, '認識を開始しています…', '');

        try {
          state.recognition.start();
        } catch (error) {
          state.starting = false;
          state.listening = false;
          setStatus(elements.voiceStatus, '音声入力を開始できませんでした', 'error');
        }
      }

      function toggleRecognition() {
        if (!state.supported) {
          return;
        }

        if (state.listening) {
          stopRecognition();
          return;
        }

        startRecognition();
      }

      function createRecognition() {
        const Recognition = getRecognitionConstructor();
        if (!Recognition) {
          state.supported = false;
          setStatus(elements.voiceStatus, 'このブラウザは音声入力に対応していません', 'error');
          updateMicButton();
          return null;
        }

        state.supported = true;
        const recognition = new Recognition();
        recognition.lang = 'ja-JP';
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
          state.listening = true;
          state.starting = false;
          setStatus(elements.voiceStatus, '録音中…', 'listening');
          updateMicButton();
        };

        recognition.onresult = (event) => {
          for (let index = event.resultIndex; index < event.results.length; index += 1) {
            const result = event.results[index];
            if (result && result.isFinal && result[0] && result[0].transcript) {
              appendTranscript(result[0].transcript);
            }
          }
        };

        recognition.onerror = (event) => {
          const code = event && event.error ? String(event.error) : '';
          state.starting = false;
          state.listening = false;

          let message = '音声入力を開始できませんでした。';
          if (code === 'not-allowed' || code === 'service-not-allowed') {
            message = 'マイクの使用が許可されていません。';
          } else if (code === 'no-speech') {
            message = '音声を認識できませんでした。もう一度マイクを押してください。';
          } else if (code === 'audio-capture') {
            message = 'マイクを利用できません。端末の設定を確認してください。';
          } else if (code === 'network') {
            message = '音声認識サービスへ接続できませんでした。';
          }

          setStatus(elements.voiceStatus, code ? `${message} (${code})` : message, 'error');
          updateMicButton();
        };

        recognition.onend = () => {
          state.starting = false;
          state.listening = false;
          setStatus(elements.voiceStatus, '待機中', '');
          updateMicButton();
        };

        return recognition;
      }

      function handleMemoInput() {
        saveUnsentText(elements.memoInput.value);
      }

      function updateMicButton() {
        elements.micButton.disabled = !state.supported;
        elements.micButton.classList.toggle('is-listening', state.listening);
        elements.micButton.setAttribute('aria-pressed', state.listening ? 'true' : 'false');
        elements.micButton.textContent = state.listening ? 'マイク停止' : 'マイク開始';
      }

      function updateSendButton() {
        elements.sendButton.disabled = state.sending || !state.token;
        elements.sendButton.textContent = '送信';
      }

      function setSendingMode(isSending) {
        state.sending = isSending;
        setStatus(elements.sendStatus, isSending ? SENDING_MESSAGE : (state.token ? '未送信' : TOP_ACCESS_MESSAGE), isSending ? 'success' : (state.token ? '' : 'error'));
        updateSendButton();
      }

      function getStoredToken() {
        return safeString(sessionStorage.getItem(TOKEN_STORAGE_KEY)).trim();
      }

      function storeToken(token) {
        const normalizedToken = safeString(token).trim();
        if (normalizedToken) {
          sessionStorage.setItem(TOKEN_STORAGE_KEY, normalizedToken);
          state.token = normalizedToken;
          return;
        }

        sessionStorage.removeItem(TOKEN_STORAGE_KEY);
        state.token = '';
      }

      function clearTokenFragment() {
        if (!window.location.hash) {
          return;
        }

        const nextUrl = `${window.location.pathname}${window.location.search}`;
        history.replaceState(null, document.title, nextUrl);
      }

      function restoreTokenFromHash() {
        const hash = safeString(window.location.hash).replace(/^#/, '');
        if (!hash) {
          return '';
        }

        const params = new URLSearchParams(hash);
        const token = safeString(params.get('token')).trim();
        if (token) {
          storeToken(token);
        }

        clearTokenFragment();
        return token;
      }

      function syncTokenState() {
        const tokenFromHash = restoreTokenFromHash();
        if (!tokenFromHash) {
          state.token = getStoredToken();
        }

        if (!state.token) {
          setStatus(elements.sendStatus, TOP_ACCESS_MESSAGE, 'error');
        } else {
          setStatus(elements.sendStatus, '未送信', '');
        }

        updateSendButton();
      }

      function buildRequestBody() {
        return JSON.stringify({
          token: state.token,
          inputText: safeString(elements.memoInput.value),
        });
      }

      function formatRecordLine(record, index) {
        const customerName = safeString(record && (record.customerName ?? record.customer_name)).trim() || '（顧客名なし）';
        const dealTheme = safeString(record && (record.dealTheme ?? record.deal_theme)).trim() || '（案件テーマなし）';
        const todoItem = safeString(record && (record.todoItem ?? record.todo_item)).trim();
        const todoLabel = todoItem ? 'あり' : 'なし';
        return `${index}. 顧客名: ${customerName} / 案件テーマ: ${dealTheme} / 宿題: ${todoLabel}`;
      }

      function renderSuccess(payload) {
        const recordCount = Number(payload && payload.recordCount);
        const records = Array.isArray(payload && payload.records) ? payload.records : [];
        const lines = [`保存しました`, `件数: ${Number.isFinite(recordCount) && recordCount > 0 ? recordCount : records.length}件`];

        if (records.length > 0) {
          records.forEach((record, index) => {
            lines.push(formatRecordLine(record, index + 1));
          });
        }

        setStatus(elements.sendStatus, '保存しました', 'success');
        setResult(lines.join('\n'), false);
      }

      function renderFailure(message) {
        const text = safeString(message).trim() || '保存に失敗しました。';
        setStatus(elements.sendStatus, text, 'error');
        setResult(text, false);
      }

      async function handleSend() {
        if (state.sending) {
          return;
        }

        if (!state.token) {
          setStatus(elements.sendStatus, TOP_ACCESS_MESSAGE, 'error');
          updateSendButton();
          return;
        }

        const inputText = safeString(elements.memoInput.value);
        if (!inputText.trim()) {
          renderFailure('入力がありません。');
          return;
        }

        saveUnsentText(inputText);
        setSendingMode(true);

        try {
          if (!safeString(GAS_SUBMIT_URL).trim()) {
            throw new Error('送信先URLが設定されていません。');
          }

          const response = await fetch(GAS_SUBMIT_URL, {
            method: 'POST',
            mode: 'cors',
            headers: {
              'Content-Type': 'text/plain;charset=UTF-8',
            },
            body: buildRequestBody(),
          });

          const responseText = await response.text();
          let payload;
          try {
            payload = JSON.parse(responseText);
          } catch (error) {
            throw new Error('GAS 応答を解析できませんでした。');
          }

          if (!response.ok || !payload || payload.success !== true) {
            throw new Error(String(payload && payload.errorMessage ? payload.errorMessage : `HTTP ${response.status}`));
          }

          clearUnsentTextAfterWriteSuccess();
          renderSuccess(payload);
        } catch (error) {
          const message = error && error.message ? error.message : String(error);
          renderFailure(message);
        } finally {
          state.sending = false;
          updateSendButton();
        }
      }

      function bindEvents() {
        elements.micButton.addEventListener('click', toggleRecognition);
        elements.sendButton.addEventListener('click', () => {
          void handleSend();
        });
        elements.memoInput.addEventListener('input', handleMemoInput);
        elements.memoInput.addEventListener('change', handleMemoInput);
        window.addEventListener('pagehide', () => {
          saveUnsentText(elements.memoInput.value);
        });
      }

      function initialize() {
        bindEvents();
        const hasSaved = restoreUnsentText();
        state.recognition = createRecognition();
        syncTokenState();
        setResult(hasSaved ? '前回の入力が復元されました。' : '（保存結果がここに表示されます）', !hasSaved);
        updateMicButton();

        if (!state.supported) {
          setStatus(elements.voiceStatus, 'このブラウザは音声入力に対応していません', 'error');
        } else {
          setStatus(elements.voiceStatus, hasSaved ? '復元済みの未送信入力があります' : '待機中', '');
        }

        if (!state.token) {
          setStatus(elements.sendStatus, TOP_ACCESS_MESSAGE, 'error');
        }
      }

      document.addEventListener('DOMContentLoaded', initialize);
    </script>
  </body>
</html>
